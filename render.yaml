services:
  - type: web
    name: stockguard-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn backend.app.main:app -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: JWT_SECRET
        value: supersecretkey
      - key: ALGORITHM
        value: HS256
